<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site Maintenance | Under Construction</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="icon" href="favicon.ico" type="image/x-icon"/>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1c1e 0%, #2d3748 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e2e8f0;
            line-height: 1.6;
        }

        .maintenance-container {
            width: 90%;
            max-width: 600px;
            padding: 2rem;
        }

        .maintenance-content {
            background: rgba(26, 32, 44, 0.95);
            padding: 3rem 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .icon-wrapper {
            position: relative;
            height: 80px;
            margin-bottom: 2rem;
        }

        .fa-cog {
            font-size: 3rem;
            position: absolute;
            left: 50%;
        }

        .fa-cog:first-child {
            transform: translateX(-50%);
            color: #60a5fa;
        }

        .fa-cog:last-child {
            transform: translateX(-20%);
            color: #3b82f6;
        }

        @keyframes rotate {
            from { transform: translateX(-50%) rotate(0deg); }
            to { transform: translateX(-50%) rotate(360deg); }
        }

        @keyframes rotate-reverse {
            from { transform: translateX(-20%) rotate(0deg); }
            to { transform: translateX(-20%) rotate(-360deg); }
        }

        .rotating {
            animation: rotate 8s linear infinite;
        }

        .reverse {
            animation: rotate-reverse 8s linear infinite;
        }

        .visitor-badge {
            margin-bottom: 1.5rem;
            display: block;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #f7fafc;
        }

        p {
            font-size: 1.1rem;
            color: #cbd5e0;
            margin-bottom: 2rem;
        }

        .details {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .detail-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .detail-item i {
            color: #60a5fa;
        }

        .progress {
            background: rgba(255, 255, 255, 0.1);
            height: 6px;
            border-radius: 3px;
            margin: 2rem 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #60a5fa, #3b82f6);
            border-radius: 3px;
            animation: progress 2s ease-in-out infinite;
            width: 30%;
        }

        @keyframes progress {
            0% { transform: translateX(-100%); width: 30%; }
            100% { transform: translateX(400%); width: 30%; }
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .social-link {
            color: #cbd5e0;
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            color: #60a5fa;
            transform: translateY(-3px);
        }

        /* Specific YouTube color on hover */
        .social-link.youtube:hover {
            color: #ff0000;
        }

        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="maintenance-container">
        <div class="maintenance-content">
            
            <div class="icon-wrapper">
                <i class="fas fa-cog rotating"></i>
                <i class="fas fa-cog rotating reverse"></i>
            </div>

            <a href="https://visitorbadge.io/status?path=artemissmp.novahosting.org"><img src="https://api.visitorbadge.io/api/visitors?path=artemissmp.novahosting.org&countColor=%23263759" /></a>
            </a>

            <h1>Site Under Maintenance</h1>
            
            <p>We're currently updating our website to bring you an even better experience</p>

            <div class="details">
                <div class="detail-item">
                    <i class="fas fa-clock"></i>
                    <span>Expected Return: 10 days</span>
                </div>
                <div class="detail-item">
                    <i class="fas fa-envelope"></i>
                    <span>Contact: <a href="mailto:support@example.com" style="color: #60a5fa; text-decoration: none;">support@example.com</a></span>
                </div>
            </div>

            <div class="progress">
                <div class="progress-bar"></div>
            </div>

            <div class="social-links">
                <a href="#" class="social-link" title="X (Twitter)"><i class="fab fa-x-twitter"></i></a>
                <a href="#" class="social-link" title="Facebook"><i class="fab fa-facebook"></i></a>
                <a href="#" class="social-link" title="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="https://youtube.com/@zenvyrex" class="social-link" title="YouTube"><i class="fab fa-youtube"></i></a>
            </div>
            
        </div>
    </div>

</body>
</html>
